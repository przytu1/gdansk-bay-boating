  <line x1="32" y1="15.5" x2="32" y2="54" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
  <!-- Horizontal crossbar -->
  <line x1="16" y1="26" x2="48" y2="26" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
  <!-- Left curved arm -->
  <path d="M32 54 C26 54 14 49 14 40" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Right curved arm -->
  <path d="M32 54 C38 54 50 49 50 40" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" fill="none"/>
